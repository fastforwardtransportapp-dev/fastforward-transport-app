function AC({ value, onChange, options, placeholder, getLabel, getKey, renderItem }) {
  const [show, setShow] = useState(false);
  const [q, setQ] = useState(value||'');
  const [hi, setHi] = useState(0);
  const ref = useRef(null);
  useEffect(() => { setQ(value||''); }, [value]);
  const filtered = useMemo(() => {
    if (!q || q.length < 1) return [];
    const low = q.toLowerCase();
    return options.filter(o => (getLabel?getLabel(o):String(o)).toLowerCase().includes(low)).slice(0,40);
  }, [q, options]);
  useEffect(() => {
    const h = e => { if (ref.current && !ref.current.contains(e.target)) setShow(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);
  function sel(opt) {
    const lbl = getLabel ? getLabel(opt) : String(opt);
    setQ(lbl); onChange(opt); setShow(false);
  }
  function onKey(e) {
    if (!show) return;
    if (e.key==='ArrowDown') { setHi(h=>Math.min(h+1,filtered.length-1)); e.preventDefault(); }
    else if (e.key==='ArrowUp') { setHi(h=>Math.max(h-1,0)); e.preventDefault(); }
    else if (e.key==='Enter' && filtered[hi]) { sel(filtered[hi]); e.preventDefault(); }
    else if (e.key==='Escape') setShow(false);
  }
  return (
    <div className="ac-wrap" ref={ref}>
      <input value={q} placeholder={placeholder}
        onChange={e=>{ setQ(e.target.value); onChange(e.target.value); setShow(true); setHi(0); }}
        onFocus={()=>setShow(true)} onKeyDown={onKey}/>
      {show && filtered.length>0 && (
        <div className="ac-list">
          {filtered.map((opt,i)=>(
            <div key={getKey?getKey(opt):i} className={'ac-item'+(i===hi?' hi':'')} onMouseDown={()=>sel(opt)}>
              {renderItem?renderItem(opt):(getLabel?getLabel(opt):String(opt))}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function LoginPage({ onLogin }) {
  const [email, setEmail] = useState('');
  const [pass, setPass] = useState('');
  const [name, setName] = useState('');
  const [mode, setMode] = useState('login'); // login | register
  const [err, setErr] = useState('');
  const [ok, setOk] = useState('');
  const [loading, setLoading] = useState(false);
  async function submit() {
    setLoading(true); setErr(''); setOk('');
    const sb = getSB();
    try {
      if (mode === 'login') {
        const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
        if (error) throw error;
        onLogin(data.user);
      } else {
        if (!email.toLowerCase().endsWith('@jsmglasgow.co.uk')) {
          setErr('Registration is restricted to @jsmglasgow.co.uk email addresses.');
          setLoading(false); return;
        }
        const { data, error } = await sb.auth.signUp({ email, password: pass, options: { data: { name } } });
        if (error) throw error;
        setOk('Account created! You can now log in.');
        setMode('login');
      }
    } catch(e) { setErr(e.message); }
    setLoading(false);
  }
  return (
    <div className="login-page">
      <div className="login-card">
        <div style={{fontSize:26,fontWeight:900,color:'#1E3A8A',marginBottom:2,letterSpacing:1}}><span style={{background:"#84CC16",color:"#0F172A",padding:"1px 7px",borderRadius:3,marginRight:6}}>FF</span>FAST-FORWARD</div>
        <div style={{color:'#888',fontSize:13,marginBottom:24}}>Transport &amp; Logistics Platform</div>
        <div className="tabs" style={{marginBottom:20}}>
          <button className={'tab'+(mode==='login'?' active':'')} onClick={()=>setMode('login')}>Sign In</button>
          <button className={'tab'+(mode==='register'?' active':'')} onClick={()=>setMode('register')}>Register</button>
        </div>
        {err && <div className="err-msg">{err}</div>}
        {ok && <div className="ok-msg">{ok}</div>}
        {mode==='register' && (
          <div className="field" style={{marginBottom:12}}>
            <label>Full Name</label>
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="Your name"/>
          </div>
        )}
        <div className="field" style={{marginBottom:12}}>
          <label>Email</label>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@jsmglasgow.co.uk"
            onKeyDown={e=>e.key==='Enter'&&submit()}/>
        </div>
        <div className="field" style={{marginBottom:18}}>
          <label>Password</label>
          <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="Password"
            onKeyDown={e=>e.key==='Enter'&&submit()}/>
        </div>
        <button className="btn btn-success" style={{width:'100%'}} onClick={submit} disabled={loading||!email||!pass}>
          {loading ? <><span className="spinner"></span> Working...</> : (mode==='login'?'Sign In':'Create Account')}
        </button>
      </div>
    </div>
  );
}

function generateInvoicePDF(inv, jobs) {
  if (!jsPDF) { alert('jsPDF not loaded'); return; }
  const doc = new jsPDF();
  const J = JSM;
  let y = 20;
  doc.setFontSize(22); doc.setFont('helvetica','bold');
  doc.setTextColor(26,26,46);
  doc.text('FAST-FORWARD TRANSPORT & LOGISTICS', 14, y); y+=8;
  doc.setFontSize(9); doc.setFont('helvetica','normal');
  doc.setTextColor(100);
  doc.text(`${J.addr1}, ${J.addr2}, ${J.addr3}`, 14, y); y+=5;
  doc.text(`Tel: ${J.phone}  |  Email: ${J.email}  |  ${J.web}`, 14, y); y+=5;
  doc.text(`Company No: ${J.co_no}  |  VAT No: ${J.vat_no}`, 14, y); y+=10;
  doc.setDrawColor(26,26,46); doc.setLineWidth(0.5);
  doc.line(14, y, 196, y); y+=8;
  doc.setFontSize(18); doc.setFont('helvetica','bold'); doc.setTextColor(26,26,46);
  doc.text('INVOICE', 14, y);
  doc.setFontSize(10); doc.setFont('helvetica','normal'); doc.setTextColor(80);
  doc.text(`Invoice No: ${inv.invoice_no}`, 140, y); y+=6;
  doc.text(`Date: ${fmtD(inv.issue_date)}`, 140, y); y+=6;
  doc.text(`Due: ${fmtD(inv.due_date)}`, 140, y); y+=10;
  doc.setFontSize(11); doc.setFont('helvetica','bold'); doc.setTextColor(26,26,46);
  doc.text('Bill To:', 14, y); y+=6;
  doc.setFont('helvetica','normal'); doc.setFontSize(10);
  doc.text(inv.customer||'', 14, y); y+=12;
  // Table header
  doc.setFillColor(26,26,46); doc.rect(14,y,182,7,'F');
  doc.setTextColor(255); doc.setFontSize(9); doc.setFont('helvetica','bold');
  doc.text('Job No.', 16, y+5);
  doc.text('Date', 40, y+5);
  doc.text('Collect', 68, y+5);
  doc.text('Deliver', 110, y+5);
  doc.text('Amount', 170, y+5, {align:'right'});
  y+=7;
  doc.setTextColor(40); doc.setFont('helvetica','normal'); doc.setFontSize(9);
  let subtotal = 0;
  jobs.forEach((job,i) => {
    if (i%2===0) { doc.setFillColor(248,249,255); doc.rect(14,y,182,6,'F'); }
    doc.text(String(job.job_no||''), 16, y+4.5);
    doc.text(fmtD(job.col_date), 40, y+4.5);
    doc.text((job.collect||'').slice(0,22), 68, y+4.5);
    doc.text((job.deliver||'').slice(0,22), 110, y+4.5);
    const amt = parseFloat(job.rate)||0;
    subtotal += amt;
    doc.text(fmtM(amt), 196, y+4.5, {align:'right'});
    y+=6;
    if (y>270) { doc.addPage(); y=20; }
  });
  y+=4;
  doc.setDrawColor(180); doc.line(14,y,196,y); y+=6;
  doc.setFontSize(10);
  const vat = subtotal * VAT_RATE;
  const total = subtotal + vat;
  doc.text('Subtotal:', 140, y); doc.text(fmtM(subtotal), 196, y, {align:'right'}); y+=6;
  doc.text(`VAT (${(VAT_RATE*100).toFixed(0)}%):`, 140, y); doc.text(fmtM(vat), 196, y, {align:'right'}); y+=6;
  doc.setFont('helvetica','bold'); doc.setFontSize(12);
  doc.text('TOTAL DUE:', 140, y); doc.text(fmtM(total), 196, y, {align:'right'}); y+=12;
  if (inv.notes) {
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(100);
    doc.text('Notes: ' + inv.notes, 14, y);
  }
  doc.save(`FastForward_Invoice_${inv.invoice_no}.pdf`);
}

function WeeklyPage({ jobs }) {
  const [expanded, setExpanded] = useState(null);
  const [year, setYear] = useState(new Date().getFullYear());
  const byWeek = useMemo(()=>{
    const m={};
    jobs.filter(j=>j.col_date&&new Date(j.col_date).getFullYear()===year).forEach(j=>{
      const w=j.week||0;
      if(!m[w])m[w]={week:w,jobs:[],rate:0,sub:0,profit:0};
      m[w].jobs.push(j);m[w].rate+=parseFloat(j.rate)||0;
      m[w].sub+=parseFloat(j.sub_rate)||0;m[w].profit+=parseFloat(j.profit)||0;
    });
    return Object.values(m).sort((a,b)=>b.week-a.week);
  },[jobs,year]);
  const yP=byWeek.reduce((s,w)=>s+w.profit,0);
  return (
    <div>
      <div className="section-hdr">
        <h1 className="page-title">Weekly Summary</h1>
        <select value={year} onChange={e=>setYear(Number(e.target.value))} style={{padding:'6px 10px',borderRadius:6,border:'1.5px solid #ddd',fontSize:13}}>
          {[2026,2027,2028].map(y=><option key={y}>{y}</option>)}
        </select>
      </div>
      <div className="stats" style={{marginBottom:16}}>
        <div className="stat"><div className="stat-label">Weeks</div><div className="stat-value">{byWeek.length}</div></div>
        <div className="stat"><div className="stat-label">Year Profit</div><div className="stat-value" style={{color:yP>=0?'#2e7d32':'#c62828'}}>{fmtM(yP)}</div></div>
        <div className="stat"><div className="stat-label">Total Jobs</div><div className="stat-value">{byWeek.reduce((s,w)=>s+w.jobs.length,0)}</div></div>
        <div className="stat"><div className="stat-label">Avg Weekly</div><div className="stat-value">{fmtM(byWeek.length?yP/byWeek.length:0)}</div></div>
      </div>
      {byWeek.map(w=>(
        <div key={w.week} className="week-block">
          <div className="week-hdr" onClick={()=>setExpanded(expanded===w.week?null:w.week)}>
            <h3>Week {w.week} <span style={{fontSize:12,color:'#aaa',fontWeight:400}}>({w.jobs.length} jobs)</span></h3>
            <div className="week-meta">
              <span>Revenue: <strong>{fmtM(w.rate)}</strong></span>
              <span>Costs: <strong>{fmtM(w.sub)}</strong></span>
              <span>Profit: <strong style={{color:w.profit>=0?'#84CC16':'#f44336'}}>{fmtM(w.profit)}</strong></span>
              <span>{expanded===w.week?'ÃÂÃÂ¢ÃÂÃÂÃÂÃÂ²':'ÃÂÃÂ¢ÃÂÃÂÃÂÃÂ¼'}</span>
            </div>
          </div>
          {expanded===w.week&&(
            <div className="table-wrap">
              <table>
                <thead><tr><th>Date</th><th>Customer</th><th>Collect</th><th>Deliver</th><th>Job No</th><th>Rate</th><th>Sub</th><th>Sub Rate</th><th>Profit</th><th>Status</th></tr></thead>
                <tbody>
                  {w.jobs.sort((a,b)=>new Date(a.col_date||0)-new Date(b.col_date||0)).map(j=>{
                    const p=parseFloat(j.profit)||0;
                    return <tr key={j.id} className={ROW_CLS[j.status]||''}>
                      <td>{fmtD(j.col_date)}</td><td><strong>{j.customer}</strong></td>
                      <td>{j.collect}</td><td>{j.deliver}</td><td>{j.job_no}</td>
                      <td>{fmtM(j.rate)}</td><td>{j.sub_contract}</td><td>{fmtM(j.sub_rate)}</td>
                      <td className={p>=0?'profit-pos':'profit-neg'}>{fmtM(p)}</td>
                      <td><span className={'badge '+(STATUS_CLS[j.status]||'b-draft')}>{j.status}</span></td>
                    </tr>;
                  })}
                  <tr style={{fontWeight:700,background:'#f0f8ff'}}>
                    <td colSpan={5}>TOTALS</td>
                    <td>{fmtM(w.rate)}</td><td></td><td>{fmtM(w.sub)}</td>
                    <td className={w.profit>=0?'profit-pos':'profit-neg'}>{fmtM(w.profit)}</td><td></td>
                  </tr>
                </tbody>
              </table>
            </div>
          )}
        </div>
      ))}
      {byWeek.length===0&&<div className="card empty">No jobs for {year} yet.</div>}
    </div>
  );
}

function InvoicesPage({ jobs, invoices, onCreateInvoice, onDeleteInvoice, userEmail }) {
  const [tab, setTab] = useState('list');
  const [selJobs, setSelJobs] = useState([]);
  const [customer, setCustomer] = useState('');
  const [issueDate, setIssueDate] = useState(new Date().toISOString().slice(0,10));
  const [dueDate, setDueDate] = useState('');
  const [notes, setNotes] = useState('');
  const [custFilter, setCustFilter] = useState('');

  const uninvoiced = useMemo(()=>jobs.filter(j=>!j.invoiced&&j.status!=='Cancelled'&&j.status!=='In Progress'),[jobs]);
  const custJobs = useMemo(()=>uninvoiced.filter(j=>!custFilter||(j.customer||'').toLowerCase().includes(custFilter.toLowerCase())),[uninvoiced,custFilter]);
  const selected = custJobs.filter(j=>selJobs.includes(j.id));
  const subtotal = selected.reduce((s,j)=>s+(parseFloat(j.rate)||0),0);
  const vat = subtotal*VAT_RATE;
  const total = subtotal+vat;

  function toggleJob(id){ setSelJobs(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]); }
  function toggleAll(){ const ids=custJobs.map(j=>j.id); setSelJobs(p=>ids.every(id=>p.includes(id))?p.filter(id=>!ids.includes(id)):[...new Set([...p,...ids])]); }

  async function create() {
    if (selJobs.length===0) return alert('Select at least one job.');
    if (!customer) return alert('Set a customer name.');
    const invNo = 'FF-' + new Date().getFullYear() + '-' + String(invoices.length+1).padStart(4,'0');
    const inv = { id: uid(), invoice_no: invNo, customer, job_ids: selJobs, issue_date: issueDate, due_date: dueDate, subtotal, vat_amount: vat, total, status: 'Draft', notes, created_by: userEmail, created_at: new Date().toISOString() };
    await onCreateInvoice(inv, selJobs);
    setSelJobs([]); setCustFilter(''); setNotes(''); setTab('list');
  }

    <div>
      <div className="section-hdr">

          {tab==='create'?'ÃÂÃÂ¢ÃÂÃÂÃÂÃÂ Back to List':'+ Create Invoice'}

        <div className="card" style={{padding:0}}>

                <tr key={inv.id}>
                  <td><strong>{inv.invoice_no}</strong></td>
                  <td>{inv.customer}</td>
                  <td>{fmtD(inv.issue_date)}</td>
                  <td>{fmtD(inv.due_date)||'ÃÂÃÂ¢ÃÂÃÂÃÂÃÂ'}</td>
                  <td>{(inv.job_ids||[]).length}</td>
                  <td>{fmtM(inv.subtotal)}</td>
                  <td>{fmtM(inv.vat_amount)}</td>
                  <td><strong>{fmtM(inv.total)}</strong></td>
                  <td><span className={'badge '+(STATUS_CLS[inv.status]||'b-draft')}>{inv.status}</span></td>
                  <td>
                    <div style={{display:'flex',gap:3}}>
                      <button className="btn btn-info btn-sm" onClick={()=>{ const ijobs=jobs.filter(j=>(inv.job_ids||[]).includes(j.id)); generateInvoicePDF(inv,ijobs); }}>ÃÂÃÂ¢ÃÂÃÂ¬ÃÂÃÂÃÂÃÂ¯ÃÂÃÂ¸ÃÂÃÂ PDF</button>
                      <button className="btn btn-danger btn-sm" onClick={()=>{if(confirm('Delete invoice '+inv.invoice_no+'?'))onDeleteInvoice(inv.id,userEmail);}}>Delete</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
      {tab==='create'&&(
        <div>
          <div className="card" style={{marginBottom:14}}>
            <div className="form-grid">
              <div className="field"><label>Customer / Bill To</label><input value={customer} onChange={e=>setCustomer(e.target.value)} placeholder="Customer name on invoice"/></div>

            <div className="btn-row" style={{justifyContent:'flex-end'}}>

function AuditPage({ sb }) {
  const [logs, setLogs] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(()=>{
    async function load(){
      try {
        const {data}=await sb.from('audit_log').select('*').order('timestamp',{ascending:false}).limit(200);
        setLogs(data||[]);
      } catch(e){}
      setLoading(false);
    }
    load();
  },[]);
  return (
    <div>
      <h1 className="page-title">Audit Log</h1>
      <div className="card">
        {loading?<div className="empty"><span className="spinner"></span></div>:
        logs.length===0?<div className="empty">No audit entries yet.</div>:(
          <div>
            <div className="audit-row audit-hdr"><span>Time</span><span>User</span><span>Action</span><span>Table</span><span>Record</span></div>
            {logs.map(l=>(
              <div key={l.id} className="audit-row">
                <span style={{color:'#888'}}>{new Date(l.timestamp).toLocaleString('en-GB')}</span>
                <span style={{color:'#0F172A',fontWeight:600}}>{l.user_email}</span>
                <span><span className={'badge '+(l.action==='CREATE'?'b-completed':l.action==='DELETE'?'b-cancelled':'b-in-progress')}>{l.action}</span></span>
                <span style={{color:'#555'}}>{l.table_name}</span>
                <span style={{color:'#888',overflow:'hidden',textOverflow:'ellipsis'}}>{l.record_id}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂ DASHBOARD ÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂ
function Dashboard({ jobs, customers, invoices, setPage }) {
  const now = new Date();
  const thisWeek = getWeek(now.toISOString().slice(0,10));
  const thisYear = now.getFullYear();
  const wkJobs = jobs.filter(j=>j.week==thisWeek&&new Date(j.col_date||0).getFullYear()===thisYear);
  const wkP = wkJobs.reduce((s,j)=>s+(parseFloat(j.profit)||0),0);
  const yrJobs = jobs.filter(j=>new Date(j.col_date||0).getFullYear()===thisYear);
  const yrP = yrJobs.reduce((s,j)=>s+(parseFloat(j.profit)||0),0);
  const active = jobs.filter(j=>j.status==='In Progress');
  const onStop = customers.filter(c=>c.on_stop);
  const unpaid = invoices.filter(i=>i.status==='Sent'||i.status==='Draft');
  const recent = [...jobs].sort((a,b)=>new Date(b.col_date||0)-new Date(a.col_date||0)).slice(0,8);
  return (
    <div>
      <h1 className="page-title">Dashboard ÃÂÃÂ¢ÃÂÃÂÃÂÃÂ Week {thisWeek}</h1>
      {onStop.length>0&&<div className="on-stop-warn" style={{marginBottom:16}}>&#9888; ON STOP: {onStop.map(c=>c.name).join(', ')}</div>}
      <div className="stats">
        <div className="stat"><div className="stat-label">This Week Jobs</div><div className="stat-value">{wkJobs.length}</div></div>
        <div className="stat"><div className="stat-label">Week Profit</div><div className="stat-value" style={{color:wkP>=0?'#2e7d32':'#c62828'}}>{fmtM(wkP)}</div></div>
        <div className="stat"><div className="stat-label">{thisYear} Jobs</div><div className="stat-value">{yrJobs.length}</div></div>
        <div className="stat"><div className="stat-label">{thisYear} Profit</div><div className="stat-value" style={{color:yrP>=0?'#2e7d32':'#c62828'}}>{fmtM(yrP)}</div></div>
        <div className="stat" style={{borderLeftColor:'#ff9800'}}><div className="stat-label">Active Jobs</div><div className="stat-value" style={{color:'#e65100'}}>{active.length}</div></div>
        <div className="stat" style={{borderLeftColor:unpaid.length>0?'#f44336':'#4caf50'}}><div className="stat-label">Unpaid Invoices</div><div className="stat-value" style={{color:unpaid.length>0?'#c62828':'#2e7d32'}}>{unpaid.length}</div></div>
      </div>
      <div className="card">
        <div className="card-title">Recent Jobs</div>
        <div className="table-wrap">
          <table>
            <thead><tr><th>Wk</th><th>Date</th><th>Customer</th><th>Collect</th><th>Deliver</th><th>Job No</th><th>Rate</th><th>Sub Rate</th><th>Profit</th><th>Status</th></tr></thead>
            <tbody>
              {recent.map(j=>{const p=parseFloat(j.profit)||0;return <tr key={j.id} className={ROW_CLS[j.status]||''}>
                <td><span className="wk-badge">{j.week}</span></td><td>{fmtD(j.col_date)}</td>
                <td><strong>{j.customer}</strong></td><td>{j.collect}</td><td>{j.deliver}</td>
                <td>{j.job_no}</td><td>{fmtM(j.rate)}</td><td>{fmtM(j.sub_rate)}</td>
                <td className={p>=0?'profit-pos':'profit-neg'}>{fmtM(p)}</td>
                <td><span className={'badge '+(STATUS_CLS[j.status]||'b-draft')}>{j.status}</span></td>
              </tr>;})}
              {recent.length===0&&<tr><td colSpan={10}><div className="empty">No jobs recorded yet. Use the Diary tab to add your first job.</div></td></tr>}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂ MAIN APP ÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂ
function App() {
  const [screen, setScreen] = useState('loading'); // loading|setup|login|app
  const [user, setUser] = useState(null);
  const [page, setPage] = useState('dashboard');
  const [jobs, setJobs] = useState([]);
  const [customers, setCustomers] = useState([]);
  const [subs, setSubs] = useState([]);
  const [addresses, setAddresses] = useState([]);
  const [invoices, setInvoices] = useState([]);
  const [emailJob, setEmailJob] = useState(null);
  const [seeding, setSeeding] = useState(false);
  const [onlineUsers, setOnlineUsers] = useState([]);

  useEffect(()=>{
    const sb = getSB();
    sb.auth.getSession().then(({data:{session}})=>{
      if (session) { setUser(session.user); setScreen('app'); loadAll(sb); }
      else setScreen('login');
    });
    sb.auth.onAuthStateChange((_,session)=>{
      if (session){setUser(session.user);setScreen('app');loadAll(sb);}
      else{setUser(null);setScreen('login');}
    });
  },[]);

  // ÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂ REAL-TIME PRESENCE ÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂÃÂÃÂ¢ÃÂÃÂÃÂÃÂ
  useEffect(()=>{
    if(!user)return;
    const sb=getSB();
    const channel=sb.channel('jsm-presence',{config:{presence:{key:user.email}}});
    channel.on('presence',{event:'sync'},()=>{
      const state=channel.presenceState();
      const users=Object.values(state).flat().map(p=>p.email||p.key||'Unknown');
      setOnlineUsers([...new Set(users)]);
    });
    channel.subscribe(async(status)=>{
      if(status==='SUBSCRIBED'){
        await channel.track({email:user.email,online_at:new Date().toISOString()});
      }
    });
    return()=>{sb.removeChannel(channel);};
  },[user]);

  async function loadAll(sb) {
    try {
      const [j,c,s,a,inv]=await Promise.all([
        sb.from('jobs').select('*').order('col_date',{ascending:false}),
        sb.from('customers').select('*').order('name'),
        sb.from('subcontractors').select('*').order('name'),
        sb.from('addresses').select('*').order('code'),
        sb.from('invoices').select('*').order('created_at',{ascending:false}),
      ]);
      setJobs(j.data||[]);
      setCustomers(c.data||[]);
      setSubs(s.data||[]);
      setAddresses(a.data||[]);
      setInvoices(inv.data||[]);
      if ((c.data||[]).length===0) offerSeed(sb);
    } catch(e){ console.error('Load error',e); }
  }

  async function offerSeed(sb) {
    if (!confirm('No reference data found. Seed from the original files? (329 customers, 828 subs, 3,249 addresses)')) return;
    setSeeding(true);
    try {
      const chunk=(arr,n)=>Array.from({length:Math.ceil(arr.length/n)},(_,i)=>arr.slice(i*n,(i+1)*n));
      const cData=(window.SEED_CUSTOMERS||[]).map(x=>({name:x.name,on_stop:x.onStop||false}));
      const sData=(window.SEED_SUBS||[]).map(x=>({name:x.name,contact:x.contact||'',area:x.area||'',town:x.town||'',email:x.email||'',phone:x.phone||''}));
      const aData=(window.SEED_ADDRESSES||[]).map(x=>({code:x.code,line1:x.line1||'',line2:x.line2||'',line3:x.line3||'',postcode:x.postcode||''}));
      for(const ch of chunk(cData,500))await sb.from('customers').upsert(ch,{onConflict:'name'});
      for(const ch of chunk(sData,500))await sb.from('subcontractors').upsert(ch,{onConflict:'name'});
      for(const ch of chunk(aData,500))await sb.from('addresses').upsert(ch,{onConflict:'code'});
      setCustomers(cData);setSubs(sData);setAddresses(aData);
      alert('Reference data seeded successfully!');
    } catch(e){ alert('Seed error: '+e.message); }
    setSeeding(false);
  }

  const nextJobNo = useMemo(()=>{
    if(jobs.length===0)return 41001;
    const nums=jobs.map(j=>parseInt(j.job_no)||0);
    return Math.max(...nums)+1;
  },[jobs]);

  async function saveJob(job, action='CREATE') {
    const sb=getSB();
    const data={...job,profit:calcP(job.rate,job.sub_rate),updated_by:user?.email,updated_at:new Date().toISOString()};
    if(!data.id||action==='CREATE')data.id=uid();
    if(action==='CREATE'){data.created_by=user?.email;data.created_at=new Date().toISOString();}
    const {error}=await sb.from('jobs').upsert(data,{onConflict:'id'});
    if(error)throw error;
    await audit(user?.email,action,'jobs',data.id,{job_no:data.job_no,customer:data.customer,status:data.status});
    setJobs(prev=>{const i=prev.findIndex(x=>x.id===data.id);if(i>=0){const n=[...prev];n[i]=data;return n;}return[data,...prev];});
  }

  async function deleteJob(id,jobNo,userEmail) {
    const sb=getSB();
    await sb.from('jobs').delete().eq('id',id);
    await audit(userEmail,'DELETE','jobs',id,{job_no:jobNo});
    setJobs(prev=>prev.filter(j=>j.id!==id));
  }

  async function saveCustomer(c,userEmail) {
    const sb=getSB();
    await sb.from('customers').upsert(c,{onConflict:'name'});
    await audit(userEmail,'UPDATE','customers',c.name,{on_stop:c.on_stop});
    setCustomers(prev=>{const i=prev.findIndex(x=>x.name===c.name);if(i>=0){const n=[...prev];n[i]=c;return n;}return[...prev,c].sort((a,b)=>a.name.localeCompare(b.name));});
  }
  async function deleteCustomer(name,userEmail){const sb=getSB();await sb.from('customers').delete().eq('name',name);await audit(userEmail,'DELETE','customers',name,{});setCustomers(p=>p.filter(c=>c.name!==name));}
  async function saveSub(s,userEmail){const sb=getSB();await sb.from('subcontractors').upsert(s,{onConflict:'name'});await audit(userEmail,'UPDATE','subcontractors',s.name,{});setSubs(prev=>{const i=prev.findIndex(x=>x.name===s.name);if(i>=0){const n=[...prev];n[i]=s;return n;}return[...prev,s].sort((a,b)=>a.name.localeCompare(b.name));});}
  async function deleteSub(name,userEmail){const sb=getSB();await sb.from('subcontractors').delete().eq('name',name);await audit(userEmail,'DELETE','subcontractors',name,{});setSubs(p=>p.filter(s=>s.name!==name));}
  async function saveAddress(a,userEmail){const sb=getSB();await sb.from('addresses').upsert(a,{onConflict:'code'});await audit(userEmail,'UPDATE','addresses',a.code,{});setAddresses(prev=>{const i=prev.findIndex(x=>x.code===a.code);if(i>=0){const n=[...prev];n[i]=a;return n;}return[...prev,a].sort((a,b)=>a.code.localeCompare(b.code));});}
  async function deleteAddress(code,userEmail){const sb=getSB();await sb.from('addresses').delete().eq('code',code);await audit(userEmail,'DELETE','addresses',code,{});setAddresses(p=>p.filter(a=>a.code!==code));}

  async function createInvoice(inv, jobIds) {
    const sb=getSB();
    await sb.from('invoices').insert(inv);
    await sb.from('jobs').update({invoiced:true,status:'Invoiced'}).in('id',jobIds);
    await audit(user?.email,'CREATE','invoices',inv.id,{invoice_no:inv.invoice_no,customer:inv.customer,total:inv.total});
    setInvoices(p=>[inv,...p]);
    setJobs(p=>p.map(j=>jobIds.includes(j.id)?{...j,invoiced:true,status:'Invoiced'}:j));
  }
  async function deleteInvoice(id,userEmail){const sb=getSB();await sb.from('invoices').delete().eq('id',id);await audit(userEmail,'DELETE','invoices',id,{});setInvoices(p=>p.filter(i=>i.id!==id));}

  async function logout(){await getSB().auth.signOut();setOnlineUsers([]);}

  if(screen==='loading')return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:12}}><div className="spinner" style={{width:36,height:36,borderWidth:3}}></div><div style={{fontSize:16,fontWeight:600,color:'#0F172A'}}>Loading Fast-Forward...</div></div>;
  if(screen==='login')return <LoginPage onLogin={u=>{setUser(u);setScreen('app');loadAll(getSB());}}/>;
  if(seeding)return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:12}}><div className="spinner" style={{width:36,height:36,borderWidth:3}}></div><div style={{fontSize:16,fontWeight:600,color:'#0F172A'}}>Preparing Fast-Forward data...</div><div style={{color:'#888'}}>Loading 4,400+ records to Supabase. One moment...</div></div>;

  const NAV=[{k:'dashboard',l:'Dashboard'},{k:'diary',l:'Diary'},{k:'weekly',l:'Weekly'},{k:'invoices',l:'Invoices'},{k:'customers',l:'Customers'},{k:'subs',l:'Subcontractors'},{k:'addresses',l:'Addresses'},{k:'audit',l:'Audit Log'},{k:'settings',l:'Settings'}];

  return (
    <div>
      <nav className="nav">
        <div className="nav-logo"><span style={{background:"var(--bp)",color:"var(--bd)",fontWeight:900,padding:"2px 7px",borderRadius:4,marginRight:6,letterSpacing:0}}>FF</span>FAST-FORWARD</div>
        {NAV.map(n=><button key={n.k} className={'nav-btn'+(page===n.k?' active':'')} onClick={()=>{setPage(n.k);setEmailJob(null);}}>{n.l}</button>)}
        <div className="nav-right">
          {onlineUsers.length>1&&<span style={{background:'#1e7e34',color:'#fff',padding:'3px 9px',borderRadius:12,fontSize:11,fontWeight:700}}>{onlineUsers.length} online</span>}
          <span style={{fontSize:11}}>{user?.email}</span>
          <button className="btn btn-outline btn-sm" onClick={logout}>Sign Out</button>
        </div>
      </nav>
      <div className="main">
        {page==='dashboard'&&<Dashboard jobs={jobs} customers={customers} invoices={invoices} setPage={setPage}/>}
        {page==='diary'&&!emailJob&&<DiaryPage jobs={jobs} customers={customers} subs={subs} addresses={addresses} onSave={saveJob} onDelete={deleteJob} nextJobNo={nextJobNo} userEmail={user?.email} setPage={setPage} setEmailJob={setEmailJob}/>}
        {page==='diary'&&emailJob&&(

  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    (async () => {
      const { data } = await sb.from('app_settings').select('*').eq('key','branding').maybeSingle();

    if (v.brand_primary) document.documentElement.style.setProperty('--bp', v.brand_primary);

    if (onBrandingChange) onBrandingChange(v);

  async function save() {
    setSaving(true); setOk(''); setErr('');

          <div style={{display:'flex',gap:8}}>
            <span style={{background:form.brand_primary,color:'#0F172A',padding:'5px 14px',borderRadius:6,fontWeight:700,fontSize:12}}>Active Button</span>
            <span style={{background:form.brand_secondary,color:'#fff',padding:'5px 14px',borderRadius:6,fontWeight:600,fontSize:12}}>Primary Button</span>
            <span style={{background:form.brand_primary,color:'#0F172A',padding:'3px 10px',borderRadius:12,fontWeight:700,fontSize:11}}>Badge</span>

        <div style={{marginTop:12,fontSize:12,color:'#888'}}>

}

<script>
// FF Entity Drawer wiring - fires after React renders
(function() {
  var portalEl = document.createElement('div');
  portalEl.id = 'ff-entity-portal';
  document.body.appendChild(portalEl);

  // Patch table cells to add click handlers for entity names
  function patchTables() {
    var cells = document.querySelectorAll('td');
    cells.forEach(function(td) {
      if(td.dataset.ffPatched) return;
      var text = td.textContent.trim();
      // Skip short/numeric cells and already-linked cells
      if(!text || text.length < 2 || /^[ÃÂÃÂÃÂÃÂ£0-9]/.test(text) || td.querySelector('button,a,.status-badge')) return;
      // Check if this looks like a name column (siblings have dates/statuses)
      var row = td.parentElement;
      if(!row) return;
      var cells2 = row.querySelectorAll('td');
      var idx = Array.from(cells2).indexOf(td);
      // Heuristic: first or second column in a table with 4+ cols often = entity name
      if(cells2.length >= 4 && idx <= 1) {
        td.dataset.ffPatched = '1';
        td.style.cursor = 'pointer';
        td.style.color = '#2563eb';
        td.style.fontWeight = '600';
        td.title = 'Click to view history';
        td.addEventListener('click', function(e) {
          e.stopPropagation();
          window.dispatchEvent(new CustomEvent('ff:openEntityDrawer', {
            detail: { name: text, type: 'entity', id: text }
          }));
        });
      }
    });
  }

  // Watch for React renders
  var observer = new MutationObserver(function() {
    clearTimeout(window._ffPatchTimer);
    window._ffPatchTimer = setTimeout(patchTables, 300);
  });
  observer.observe(document.body, { childList: true, subtree: true });
  setTimeout(patchTables, 1500);
})();
</script>
<script id="ff-sticky-fix">
(function(){
  var NAV_H = 56; // our top nav height in px
  function fixStickyElements(){
    // Fix ALL elements with position:sticky - handles inline styles too
    var all = document.querySelectorAll('*');
    for(var i=0;i<all.length;i++){
      var el = all[i];
      var cs = window.getComputedStyle(el);
      if(cs.position === 'sticky' && el.className !== 'ff-topnav'){
        var top = parseInt(cs.top)||0;
        // If top is less than our nav height, push it down
        if(top < NAV_H){
          el.style.top = NAV_H + 'px';
        }
      }
    }
  }
  // Run after React mounts
  setTimeout(fixStickyElements, 800);
  setTimeout(fixStickyElements, 2000);
  setTimeout(fixStickyElements, 4000);
  // Watch for new sticky elements added by React re-renders
  var obs = new MutationObserver(function(){
    clearTimeout(window._stickyTimer);
    window._stickyTimer = setTimeout(fixStickyElements, 300);
  });
  document.addEventListener('DOMContentLoaded', function(){
    obs.observe(document.body, {childList:true, subtree:true, attributeFilter:['style','class']});
  });
  // Also fix on scroll to catch late-rendered stickies
  var scrollFixed = false;
  window.addEventListener('scroll', function(){
    if(!scrollFixed){ fixStickyElements(); scrollFixed=true; setTimeout(()=>{scrollFixed=false;},1000); }
  });
})();
</script>
